<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Сенсор Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;550;600;650;700&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/app.css"/>
<style id="suite-shell-css">
/* ===== Оболочка: топбар-навигация, командная палитра, новые ui-хелперы =====
   Держим здесь, чтобы не трогать css/app.css; используем только токены дизайн-системы. */

/* топбар: breadcrumb + заголовок */
.topbar-head{display:flex;flex-direction:column;gap:1px;min-width:0}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);font-weight:550;line-height:1;margin-bottom:3px}
.breadcrumb:empty{display:none}
.breadcrumb .bc-seg{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
.breadcrumb .bc-seg.cur{color:var(--ink-2)}
.breadcrumb .bc-sep{color:var(--line-2)}

/* глобальный поиск (триггер палитры) */
.global-search{display:inline-flex;align-items:center;gap:8px;font:inherit;font-size:13px;color:var(--muted);
  background:var(--panel-2);border:1px solid var(--line);border-radius:999px;padding:7px 8px 7px 12px;cursor:text;
  transition:.14s;min-width:200px}
.global-search:hover{border-color:var(--line-2);color:var(--ink-2)}
.global-search:focus-visible{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.global-search .gs-ic{font-size:15px;line-height:1}
.global-search .gs-text{flex:1;text-align:left}
.global-search .gs-kbd{margin-left:auto}
@media(max-width:720px){.global-search .gs-text,.global-search .gs-kbd{display:none}.global-search{min-width:0;padding:8px;border-radius:50%}}

/* индикатор демо-данных */
.demo-indicator{display:inline-flex;align-items:center;gap:7px;font:inherit;font-size:12px;font-weight:600;
  color:var(--warn);background:#fdf3e3;border:1px solid transparent;border-radius:999px;padding:5px 11px;cursor:pointer;transition:.14s;white-space:nowrap}
.demo-indicator:hover{filter:brightness(.97)}
[data-theme="dark"] .demo-indicator{background:#2c220d}
.demo-indicator .demo-dot{width:7px;height:7px;border-radius:50%;background:var(--warn);box-shadow:0 0 0 0 rgba(200,136,26,.45);animation:demopulse 2s infinite}
@keyframes demopulse{0%{box-shadow:0 0 0 0 rgba(200,136,26,.4)}70%{box-shadow:0 0 0 6px rgba(200,136,26,0)}100%{box-shadow:0 0 0 0 rgba(200,136,26,0)}}

/* модал: крестик + появление */
.modal-bg{opacity:0;transition:opacity .16s ease}
.modal-bg.show{opacity:1}
.modal{position:relative;transform:translateY(8px) scale(.98);transition:transform .18s cubic-bezier(.2,.7,.3,1)}
.modal-bg.show .modal{transform:none}
.modal-x{position:absolute;top:12px;right:12px;width:30px;height:30px;display:grid;place-items:center;border:none;background:transparent;
  color:var(--muted);font-size:22px;line-height:1;border-radius:8px;cursor:pointer;transition:.12s}
.modal-x:hover{background:var(--panel-2);color:var(--ink)}
.modal-msg{margin:0 0 14px;font-size:14px;color:var(--ink-2);line-height:1.55}
.pm-label{display:block;font-size:12.5px;font-weight:550;margin-bottom:6px;color:var(--ink-2)}
input.invalid,textarea.invalid{border-color:var(--err);box-shadow:0 0 0 3px var(--err-soft)}

/* кнопка-danger (для confirm) */
.btn.danger{background:var(--err);border-color:var(--err);color:#fff}
.btn.danger:hover{filter:brightness(.94)}

/* badge доп. варианты */
.badge.info{background:var(--accent-soft);color:var(--accent-d);border-color:transparent}
.badge.accent{background:var(--navy);color:#fff;border-color:transparent}

/* empty: действие */
.empty .empty-action{margin-top:16px}

/* skeleton */
.skeleton{display:flex;flex-direction:column;gap:10px;padding:2px 0}
.sk-line{height:13px;border-radius:7px;background:linear-gradient(90deg,var(--line) 25%,var(--line-2) 37%,var(--line) 63%);
  background-size:400% 100%;animation:skshine 1.4s ease infinite}
@keyframes skshine{0%{background-position:100% 0}100%{background-position:0 0}}

/* tabs: underline-вариант (pill уже есть в app.css) */
.tabs-underline{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:16px;overflow-x:auto}
.tabs-underline .tab{position:relative;font:inherit;font-size:13.5px;font-weight:550;color:var(--muted);background:none;border:none;
  padding:10px 14px 11px;cursor:pointer;white-space:nowrap;transition:.12s;border-bottom:2px solid transparent;margin-bottom:-1px}
.tabs-underline .tab:hover{color:var(--ink-2)}
.tabs-underline .tab.active{color:var(--ink);border-bottom-color:var(--accent)}
.tabs-underline .tab:focus-visible,.pill-tabs .pill:focus-visible{outline:none;box-shadow:0 0 0 3px var(--accent-soft);border-radius:8px}
.pill-tabs .pill{font:inherit;background:var(--panel);transition:.12s}
.t-count{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;
  font-size:11px;font-weight:600;line-height:1;padding:0 6px;border-radius:999px;
  background:var(--panel-2);color:var(--muted);margin-left:6px;font-variant-numeric:tabular-nums;
  vertical-align:middle;transition:background var(--t-fast) var(--ease),color var(--t-fast) var(--ease)}
.tabs-underline .tab.active .t-count{background:var(--accent-soft);color:var(--accent-d)}
.pill-tabs .pill.active .t-count,.pill.active .t-count{background:rgba(255,255,255,.22);color:inherit}
[data-theme="dark"] .pill-tabs .pill.active .t-count,[data-theme="dark"] .pill.active .t-count{background:rgba(255,255,255,.16)}
.t-ic{display:inline-flex;align-items:center;margin-right:6px;line-height:1;vertical-align:middle}

/* table доп. */
.tbl-scroll{overflow:auto;border:1px solid var(--line);border-radius:var(--radius-s)}
.tbl-scroll .tbl th{position:sticky;top:0;background:var(--panel);z-index:1}
.tbl.dense th,.tbl.dense td{padding:6px 10px}
.tbl-cap{font-size:12px;color:var(--muted);margin-bottom:8px}

/* ===== командная палитра (Cmd/Ctrl-K) ===== */
.cmdk-bg{position:fixed;inset:0;z-index:9500;background:rgba(20,26,34,.4);backdrop-filter:blur(2px);
  display:flex;justify-content:center;align-items:flex-start;padding:14vh 20px 20px;opacity:0;transition:opacity .14s ease}
.cmdk-bg.show{opacity:1}
.cmdk{width:100%;max-width:600px;background:var(--panel);border:1px solid var(--line);border-radius:16px;
  box-shadow:0 24px 64px rgba(20,26,34,.28),0 2px 8px rgba(20,26,34,.12);overflow:hidden;
  transform:translateY(-10px) scale(.985);transition:transform .18s cubic-bezier(.2,.7,.3,1)}
.cmdk-bg.show .cmdk{transform:none}
.cmdk-head{display:flex;align-items:center;gap:11px;padding:14px 16px;border-bottom:1px solid var(--line)}
.cmdk-ic{font-size:18px;color:var(--muted)}
.cmdk-input{flex:1;border:none;background:none;font:inherit;font-size:16px;color:var(--ink);padding:0}
.cmdk-input:focus{outline:none;box-shadow:none}
.cmdk-input::placeholder{color:var(--muted)}
.cmdk-esc{opacity:.7}
.cmdk-list{max-height:50vh;overflow-y:auto;padding:6px}
.cmdk-group{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600;padding:10px 12px 4px}
.cmdk-item{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:10px;cursor:pointer;color:var(--ink);transition:background .08s}
.cmdk-item.active{background:var(--accent-soft)}
.cmdk-item.active .cmdk-item-title{color:var(--accent-d)}
.cmdk-item-ic{width:22px;height:22px;display:grid;place-items:center;flex:0 0 22px;font-size:15px;color:var(--ink-2)}
.cmdk-item-ic svg{width:18px;height:18px}
.cmdk-item-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
.cmdk-item-title{font-size:14px;font-weight:550;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmdk-item-hint{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmdk-item-kind{font-size:10.5px;color:var(--muted);background:var(--panel-2);border:1px solid var(--line);border-radius:999px;padding:2px 8px;flex:0 0 auto}
.cmdk-item.active .cmdk-item-kind{background:rgba(214,47,30,.1);border-color:transparent;color:var(--accent-d)}
.cmdk-empty{padding:32px 16px;text-align:center;color:var(--muted);font-size:13.5px}
.cmdk-foot{display:flex;align-items:center;gap:16px;padding:9px 16px;border-top:1px solid var(--line);background:var(--panel-2);font-size:11.5px;color:var(--muted)}
.cmdk-foot .kbd{font-size:11px;padding:1px 5px}
.cmdk-count{margin-left:auto}
@media(max-width:520px){.cmdk-bg{padding:8vh 12px 12px}.cmdk-foot{display:none}}

@media(prefers-reduced-motion:reduce){
  .modal,.cmdk,.modal-bg,.cmdk-bg{transition:none}
  .sk-line{animation:none}
  .demo-indicator .demo-dot{animation:none}
}
</style>
<!-- генерация .docx в браузере (локальные библиотеки, без CDN — работает офлайн) -->

<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">С</div>
      <div>Сенсор Suite<small>тестовый стенд · все отделы</small></div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-foot">
      <span id="theme-toggle" class="btn ghost sm" title="Тема" style="cursor:pointer">◐ Тема</span>
      <span class="env-badge" id="env-badge">web</span>
    </div>
  </aside>
  <main class="main">
    <header class="topbar">
      <div class="topbar-head">
        <nav class="breadcrumb" id="breadcrumb" aria-label="Хлебные крошки"></nav>
        <h1 id="page-title">Сенсор Suite</h1>
        <div class="sub" id="page-sub"></div>
      </div>
      <div class="spacer"></div>
      <button class="global-search" id="global-search" type="button" aria-label="Поиск по модулям и действиям" aria-keyshortcuts="Meta+K Control+K">
        <span class="gs-ic" aria-hidden="true">⌕</span>
        <span class="gs-text">Поиск…</span>
        <span class="kbd gs-kbd">⌘K</span>
      </button>
      <button class="demo-indicator" id="demo-indicator" type="button" title="Часть интеграций показывает демо-данные" style="display:none"></button>
      <a class="btn ghost sm" href="#/settings" title="Настройки и интеграции">⚙︎ Настройки</a>
    </header>
    <div class="content"><div id="view" class="container"></div></div>
  </main>
</div>
