<head>
<meta charset="utf-8"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;550;600;650;700&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet"/>

<style id="suite-shell-css">
/* ===== Оболочка: топбар-навигация, командная палитра, новые ui-хелперы =====
   Держим здесь, чтобы не трогать css/app.css; используем только токены дизайн-системы. */

/* топбар: breadcrumb + заголовок */
.topbar-head{display:flex;flex-direction:column;gap:1px;min-width:0}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);font-weight:550;line-height:1;margin-bottom:3px}
.breadcrumb:empty{display:none}
.breadcrumb .bc-seg{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
.breadcrumb .bc-seg.cur{color:var(--ink-2)}
.breadcrumb .bc-sep{color:var(--line-2)}

/* глобальный поиск (триггер палитры) */
.global-search{display:inline-flex;align-items:center;gap:8px;font:inherit;font-size:13px;color:var(--muted);
  background:var(--panel-2);border:1px solid var(--line);border-radius:999px;padding:7px 8px 7px 12px;cursor:text;min-height:24px;
  transition:border-color var(--t-fast) var(--ease),color var(--t-fast) var(--ease),background var(--t-fast) var(--ease),box-shadow var(--t-fast) var(--ease);min-width:200px}
.global-search:hover{border-color:var(--line-2);color:var(--ink-2)}
.global-search:focus-visible{outline:none;border-color:var(--accent);box-shadow:var(--ring)}
.global-search .gs-ic{font-size:15px;line-height:1}
.global-search .gs-text{flex:1;text-align:left}
.global-search .gs-kbd{margin-left:auto}
@media(max-width:720px){.global-search .gs-text,.global-search .gs-kbd{display:none}.global-search{min-width:0;padding:8px;border-radius:50%}}

/* индикатор демо-данных */
.demo-indicator{display:inline-flex;align-items:center;gap:7px;font:inherit;font-size:12px;font-weight:600;
  color:var(--warn-d);background:var(--warn-soft);border:1px solid transparent;border-radius:999px;padding:5px 11px;cursor:pointer;
  transition:filter var(--t-fast) var(--ease),box-shadow var(--t-fast) var(--ease);white-space:nowrap;min-height:24px}
.demo-indicator:hover{filter:brightness(.97)}
.demo-indicator:focus-visible{outline:none;box-shadow:var(--ring)}
[data-theme="dark"] .demo-indicator{color:var(--warn);background:var(--warn-soft)}
.demo-indicator .demo-dot{width:7px;height:7px;border-radius:50%;background:var(--warn);box-shadow:0 0 0 0 rgba(200,136,26,.45);animation:demopulse 2s infinite}
@keyframes demopulse{0%{box-shadow:0 0 0 0 rgba(200,136,26,.4)}70%{box-shadow:0 0 0 6px rgba(200,136,26,0)}100%{box-shadow:0 0 0 0 rgba(200,136,26,0)}}

/* модал: крестик + появление.
   Затемнение (scrim) затухает через background/backdrop-filter, НЕ через opacity
   всей подложки — иначе содержимое модалки кадр-другой полупрозрачно и контраст
   проседает. Контент модалки всегда непрозрачен; въезд панели — трансформом. */
.modal-bg{background:rgba(15,19,26,0);-webkit-backdrop-filter:blur(0);backdrop-filter:blur(0);
  transition:background var(--t) var(--ease),backdrop-filter var(--t) var(--ease),-webkit-backdrop-filter var(--t) var(--ease)}
.modal-bg.show{background:rgba(15,19,26,.5);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}
.modal{position:relative;transform:translateY(8px) scale(.98);transition:transform var(--t) var(--ease-out)}
.modal-bg.show .modal{transform:none}
.modal-x{position:absolute;top:12px;right:12px;width:30px;height:30px;display:grid;place-items:center;border:none;background:transparent;
  color:var(--muted);font-size:22px;line-height:1;border-radius:var(--radius-xs);cursor:pointer;
  transition:background var(--t-fast) var(--ease),color var(--t-fast) var(--ease)}
.modal-x:hover{background:var(--panel-2);color:var(--ink)}
.modal-x:focus-visible{outline:none;box-shadow:var(--ring);color:var(--ink)}
.modal-msg{margin:0 0 14px;font-size:14px;color:var(--ink-2);line-height:1.55}
.pm-label{display:block;font-size:12.5px;font-weight:550;margin-bottom:6px;color:var(--ink-2)}
input.invalid,textarea.invalid{border-color:var(--err);box-shadow:0 0 0 3px color-mix(in srgb, var(--err) 25%, transparent)}

/* кнопка-danger (для confirm) */
.btn.danger{background:var(--err);border-color:var(--err);color:#fff}
.btn.danger:hover{filter:brightness(.94)}

/* badge доп. варианты.
   .badge.info уже задан в app.css информационным синим (--info/--info-soft) —
   НЕ переопределяем здесь, иначе info визуально сливается с accent (брендовый красный). */
.badge.accent{background:var(--navy);color:var(--navy-ink);border-color:transparent}

/* empty: действие */
.empty .empty-action{margin-top:16px}

/* skeleton — живой вариант (ui.skeleton(): контейнер .skeleton + строки .sk-line).
   Гасим унаследованный из app.css фон и бегущий ::after-шиммер контейнера, чтобы
   мерцала только каждая строка .sk-line (без двойного шиммера поверх блока). */
.skeleton{display:flex;flex-direction:column;gap:10px;padding:2px 0;background:transparent;overflow:visible}
.skeleton::after{content:none}
.sk-line{height:13px;border-radius:7px;background:linear-gradient(90deg,var(--line) 25%,var(--line-2) 37%,var(--line) 63%);
  background-size:400% 100%;animation:skshine 1.4s ease infinite}
@keyframes skshine{0%{background-position:100% 0}100%{background-position:0 0}}

/* tabs: underline-вариант (pill уже есть в app.css) */
.tabs-underline{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:16px;overflow-x:auto}
.tabs-underline .tab{position:relative;font:inherit;font-size:13.5px;font-weight:550;color:var(--muted);background:none;border:none;
  padding:10px 14px 11px;cursor:pointer;white-space:nowrap;
  transition:color var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease);border-bottom:2px solid transparent;margin-bottom:-1px}
.tabs-underline .tab:hover{color:var(--ink-2)}
.tabs-underline .tab.active{color:var(--ink);border-bottom-color:var(--accent)}
.tabs-underline .tab:focus-visible,.pill-tabs .pill:focus-visible{outline:none;box-shadow:var(--ring);border-radius:var(--radius-xs);position:relative;z-index:1}
.pill-tabs .pill{font:inherit;background:var(--panel);transition:background var(--t-fast) var(--ease),color var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease),box-shadow var(--t-fast) var(--ease)}
.t-count{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;
  font-size:11px;font-weight:600;line-height:1;padding:0 6px;border-radius:999px;
  background:var(--panel-2);color:var(--muted);margin-left:6px;font-variant-numeric:tabular-nums;
  vertical-align:middle;transition:background var(--t-fast) var(--ease),color var(--t-fast) var(--ease)}
.tabs-underline .tab.active .t-count{background:var(--accent-soft);color:var(--accent-d)}
.pill-tabs .pill.active .t-count,.pill.active .t-count{background:rgba(255,255,255,.22);color:inherit}
[data-theme="dark"] .pill-tabs .pill.active .t-count,[data-theme="dark"] .pill.active .t-count{background:rgba(255,255,255,.16)}
.t-ic{display:inline-flex;align-items:center;margin-right:6px;line-height:1;vertical-align:middle}

/* table доп. */
.tbl-scroll{overflow:auto;border:1px solid var(--line);border-radius:var(--radius-s)}
.tbl-scroll .tbl th{position:sticky;top:0;background:var(--panel);z-index:1}
.tbl.dense th,.tbl.dense td{padding:6px 10px}
.tbl-cap{font-size:12px;color:var(--muted);margin-bottom:8px}

/* ===== командная палитра (Cmd/Ctrl-K) ===== */
.cmdk-bg{position:fixed;inset:0;z-index:9500;background:rgba(15,19,26,0);
  -webkit-backdrop-filter:blur(0);backdrop-filter:blur(0);
  display:flex;justify-content:center;align-items:flex-start;padding:14vh 20px 20px;
  transition:background var(--t) var(--ease),backdrop-filter var(--t) var(--ease),-webkit-backdrop-filter var(--t) var(--ease)}
.cmdk-bg.show{background:rgba(15,19,26,.5);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}
.cmdk{width:100%;max-width:600px;background:var(--panel);border:1px solid var(--line);border-radius:16px;
  box-shadow:var(--shadow-l);overflow:hidden;
  transform:translateY(-10px) scale(.985);transition:transform var(--t) var(--ease-out)}
.cmdk-bg.show .cmdk{transform:none}
.cmdk-head{display:flex;align-items:center;gap:11px;padding:14px 16px;border-bottom:1px solid var(--line)}
.cmdk-ic{font-size:18px;color:var(--muted)}
.cmdk-input{flex:1;border:none;background:none;font:inherit;font-size:16px;color:var(--ink);padding:0}
.cmdk-input:focus{outline:none;box-shadow:none}
.cmdk-input::placeholder{color:var(--muted)}
.cmdk-esc{opacity:.7}
.cmdk-list{max-height:50vh;overflow-y:auto;padding:6px}
.cmdk-group{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600;padding:10px 12px 4px}
.cmdk-item{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:10px;cursor:pointer;color:var(--ink);transition:background .08s}
.cmdk-item.active{background:var(--accent-soft)}
.cmdk-item.active .cmdk-item-title{color:var(--accent-d)}
.cmdk-item-ic{width:22px;height:22px;display:grid;place-items:center;flex:0 0 22px;font-size:15px;color:var(--ink-2)}
.cmdk-item-ic svg{width:18px;height:18px}
.cmdk-item-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
.cmdk-item-title{font-size:14px;font-weight:550;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmdk-item-hint{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmdk-item-kind{font-size:10.5px;color:var(--muted);background:var(--panel-2);border:1px solid var(--line);border-radius:999px;padding:2px 8px;flex:0 0 auto}
.cmdk-item.active .cmdk-item-kind{background:color-mix(in srgb, var(--accent) 12%, transparent);border-color:transparent;color:var(--accent-d)}
.cmdk-empty{padding:32px 16px;text-align:center;color:var(--muted);font-size:13.5px}
.cmdk-foot{display:flex;align-items:center;gap:16px;padding:9px 16px;border-top:1px solid var(--line);background:var(--panel-2);font-size:11.5px;color:var(--muted)}
.cmdk-foot .kbd{font-size:11px;padding:1px 5px}
.cmdk-count{margin-left:auto}
@media(max-width:520px){.cmdk-bg{padding:8vh 12px 12px}.cmdk-foot{display:none}}

/* тач-цели оболочки: на грубом указателе крестик модалки и пункты палитры
   крупнее для уверенного нажатия (WCAG 2.5.8). Mouse-раскладка не меняется. */
@media(pointer:coarse){
  .modal-x{width:40px;height:40px;font-size:24px}
  .cmdk-item{padding:12px}
  .global-search{padding:10px 12px}
}

@media(prefers-reduced-motion:reduce){
  .modal,.cmdk,.modal-bg,.cmdk-bg{transition:none}
  .sk-line{animation:none}
  .demo-indicator .demo-dot{animation:none}
  .global-search,.demo-indicator,.modal-x{transition:none}
}

/* ===== шпаргалка горячих клавиш (модалка) ===== */
.ks-list{display:flex;flex-direction:column;gap:2px;margin-bottom:4px}
.ks-row{display:flex;align-items:center;gap:14px;padding:9px 0;border-bottom:1px solid var(--line)}
.ks-row:last-child{border-bottom:none}
.ks-keys{flex:0 0 132px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ks-or{font-size:11px;color:var(--muted)}
.ks-label{flex:1;min-width:0;font-size:13px;color:var(--ink-2);line-height:1.45}
.ks-note{margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
.ks-note p{margin:0 0 8px;font-size:12.5px;color:var(--muted);line-height:1.5}
.ks-note p:last-child{margin-bottom:0}
.ks-note strong{color:var(--ink-2);font-weight:600}

/* ===== сегмент-контрол ролей (Настройки → Оформление) ===== */
.role-seg{display:inline-flex;gap:4px;padding:4px;background:var(--panel-2);
  border:1px solid var(--line);border-radius:999px}
.role-seg .role-opt{font:inherit;font-size:13px;font-weight:550;color:var(--ink-2);
  background:transparent;border:none;border-radius:999px;padding:7px 16px;cursor:pointer;
  transition:background var(--t-fast) var(--ease),color var(--t-fast) var(--ease)}
.role-seg .role-opt:hover{color:var(--ink)}
.role-seg .role-opt:focus-visible{outline:none;box-shadow:var(--ring)}
.role-seg .role-opt.active{background:var(--navy);color:var(--navy-ink)}
.role-hint{margin:10px 0 0;font-size:12px;color:var(--muted);line-height:1.5}

/* ===== приветственный тур (онбординг) — переиспользует модалку ===== */
.onboarding-modal .modal{max-width:540px;width:100%}
.onboarding-modal .modal-body{padding-top:2px}
/* визуально скрываем дублирующий h3 модалки (заголовок шага задаёт .ob-title),
   но оставляем его в DOM как доступное имя/labelledby (a11y) */
.onboarding-modal .modal>h3{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
.ob-head{display:flex;align-items:center;gap:11px;margin:2px 0 14px}
.ob-step-ic{flex:0 0 40px;width:40px;height:40px;display:grid;place-items:center;border-radius:12px;
  font-size:21px;line-height:1;background:var(--accent-soft);border:1px solid transparent}
.ob-title{margin:0;font-size:18px;font-weight:650;letter-spacing:-.01em;line-height:1.2}
.ob-body{min-height:168px}
.ob-lead{margin:0 0 14px;font-size:14px;color:var(--ink-2);line-height:1.55}
.ob-note{margin:14px 0 0;font-size:12.5px;color:var(--muted);line-height:1.5}
.ob-note strong{color:var(--ink-2);font-weight:600}
.ob-list{margin:0 0 4px;padding-left:18px;display:flex;flex-direction:column;gap:7px}
.ob-list li{font-size:13px;color:var(--ink-2);line-height:1.45}
.ob-list strong{color:var(--ink);font-weight:600}
.ob-twocol{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:4px 0 6px}
@media(max-width:520px){.ob-twocol{grid-template-columns:1fr}}
.ob-mini{background:var(--panel-2);border:1px solid var(--line);border-radius:var(--radius-s);padding:12px 13px}
.ob-mini-ic{font-size:18px;line-height:1;margin-bottom:6px}
.ob-mini-t{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:3px}
.ob-mini-s{font-size:11.5px;color:var(--muted);line-height:1.45}
.ob-dept-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
@media(max-width:520px){.ob-dept-grid{grid-template-columns:1fr}}
.ob-dept{display:flex;flex-direction:column;gap:1px;background:var(--panel-2);border:1px solid var(--line);
  border-radius:var(--radius-xs);padding:9px 11px}
.ob-dept-ic{font-size:15px;line-height:1;margin-bottom:3px}
.ob-dept b{font-size:12.5px;font-weight:600;color:var(--ink)}
.ob-dept span{font-size:11px;color:var(--muted);line-height:1.4}
.ob-callout{display:flex;align-items:flex-start;gap:10px;margin-top:14px;padding:11px 13px;
  background:var(--warn-soft);border:1px solid transparent;border-radius:var(--radius-s)}
.ob-callout-ic{font-size:16px;line-height:1.3;flex:0 0 auto}
.ob-callout span{font-size:12.5px;color:var(--ink-2);line-height:1.5}
.ob-callout strong{color:var(--ink);font-weight:600}
.ob-role-slot{margin:4px 0}
.ob-role-seg{display:flex}
.ob-keys{display:flex;flex-direction:column;gap:2px}
.ob-key-row{display:flex;align-items:center;gap:14px;padding:9px 0;border-bottom:1px solid var(--line)}
.ob-key-row:last-child{border-bottom:none}
.ob-key-keys{flex:0 0 128px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ob-or{font-size:11px;color:var(--muted)}
.ob-key-label{flex:1;min-width:0;font-size:12.5px;color:var(--ink-2);line-height:1.45}
.ob-foot{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:18px;padding-top:14px;border-top:1px solid var(--line)}
.ob-progress{display:flex;align-items:center;gap:7px}
.ob-dot{width:7px;height:7px;border-radius:50%;background:var(--line-3);transition:background var(--t-fast) var(--ease),transform var(--t-fast) var(--ease)}
.ob-dot.done{background:var(--accent-soft-2)}
.ob-dot.on{background:var(--accent);transform:scale(1.25)}
.ob-count{font-size:11.5px;color:var(--muted);margin-left:6px;font-variant-numeric:tabular-nums}
.ob-actions{display:flex;align-items:center;gap:8px;margin-left:auto;flex-wrap:wrap}
@media(max-width:520px){.ob-foot{flex-direction:column;align-items:stretch}.ob-actions{margin-left:0;justify-content:flex-end}}
@media(prefers-reduced-motion:reduce){.ob-dot{transition:none}}
</style>
<!-- ранняя установка темы ДО первого рендера, чтобы не было вспышки светлой темы.
     Читаем тот же ключ store ('sensor_suite_v1'), поддерживаем light|dark|auto. -->
<script>
(function(){
  try{
    var s = JSON.parse(localStorage.getItem('sensor_suite_v1')||'{}') || {};
    var pref = s.theme;
    var force = (window.SUITE_CONFIG && window.SUITE_CONFIG.forceTheme) || null;
    if(pref!=='light' && pref!=='dark' && pref!=='auto') pref = (force==='dark'||force==='light') ? force : 'light';
    var resolved = pref;
    if(pref==='auto'){
      resolved = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', resolved);
  }catch(e){ document.documentElement.setAttribute('data-theme','light'); }
})();
</script>
